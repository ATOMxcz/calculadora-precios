<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1c1c1e;
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 14px;
  opacity: 0.7;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #2c2c2e;
  color: white;
}

.result {
  background: #2c2c2e;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.result span {
  font-size: 18px;
  font-weight: bold;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

.copy {
  background: #0a84ff;
  color: white;
}

.reset {
  background: #3a3a3c;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>Calculadora</h2>

  <label>Costo</label>
  <input type="number" id="costo" placeholder="Ej: 100">

  <label>Descuento (%)</label>
  <input type="number" id="descuento" value="0">

  <div class="result">
    Resultado 1: <span id="r1">$0.00</span>
  </div>

  <div class="result">
    Resultado 3: <span id="r3">$0.00</span>
  </div>

  <div class="buttons">
    <button class="copy" onclick="copiar()">Copiar</button>
    <button class="reset" onclick="resetear()">Reset</button>
  </div>
</div>

<script>
function calcular() {
  let costo = parseFloat(document.getElementById("costo").value) || 0;
  let descuento = parseFloat(document.getElementById("descuento").value) || 0;

  let r1 = costo - (costo * (descuento / 100));
  let r2 = r1 * 1.16 * 1.4;
  let redondeado = Math.round(r2);
  let r3 = redondeado / 1.16;

  document.getElementById("r1").innerText = "$" + r1.toFixed(2);
  document.getElementById("r3").innerText = "$" + r3.toFixed(2);
}

function copiar() {
  let r1 = document.getElementById("r1").innerText;
  let r3 = document.getElementById("r3").innerText;

  let texto = `Resultado 1: ${r1} | Resultado 3: ${r3}`;

  navigator.clipboard.writeText(texto);

  alert("Copiado al portapapeles 📋");
}

function resetear() {
  document.getElementById("costo").value = "";
  document.getElementById("descuento").value = "0";
  calcular();
}

document.getElementById("costo").addEventListener("input", calcular);
document.getElementById("descuento").addEventListener("input", calcular);
</script>

</body>
</html>
