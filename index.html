<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px 0;
  box-sizing: border-box;
}

.container {
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 24px;
  width: 320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

label {
  font-size: 13px;
  opacity: 0.6;
}

input {
  width: 100%;
  padding: 14px;
  margin: 6px 0 14px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  background: #2c2c2e;
  color: white;
  outline: none;
  box-sizing: border-box;
}

.result {
  background: #2c2c2e;
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.result:hover {
  background: #3a3a3c;
}

.result.copiado {
  background: #0a84ff;
}

.result span {
  font-size: 18px;
  font-weight: bold;
}

.hint {
  font-size: 11px;
  opacity: 0.4;
  margin-top: 4px;
}

.preview {
  background: #1c2a1c;
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  cursor: default;
  border: 1px solid rgba(48, 209, 88, 0.15);
}

.preview span {
  font-size: 18px;
  font-weight: bold;
  color: #30d158;
}

.preview .hint {
  color: #30d158;
  opacity: 0.5;
}

.section-label {
  font-size: 11px;
  opacity: 0.35;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 16px;
  margin-bottom: 2px;
}

.reset {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #3a3a3c;
  color: white;
  cursor: pointer;
  font-size: 15px;
}

.reset:hover {
  background: #48484a;
}
</style>
</head>

<body>

<div class="container">
  <h2>Calculadora</h2>

  <label>Costo base</label>
  <input type="number" id="costo" placeholder="Ej: 100">

  <label>Descuento (%)</label>
  <input type="number" id="descuento" value="0">

  <div class="result" onclick="copiar('r1', this)">
    Costo: <span id="r1">$0.00</span>
    <div class="hint">toca para copiar</div>
  </div>

  <div class="result" onclick="copiar('r3', this)">
    Precio de venta: <span id="r3">$0.00</span>
    <div class="hint">toca para copiar</div>
  </div>

  <div class="result" onclick="copiar('menudeo', this)">
    Precio de menudeo: <span id="menudeo">$0.00</span>
    <div class="hint">toca para copiar</div>
  </div>

  <div class="section-label">Previsualización con IVA</div>

  <div class="preview">
    PDV + IVA: <span id="prevPDV">$0.00</span>
    <div class="hint">solo referencia</div>
  </div>

  <div class="preview">
    Menudeo + IVA: <span id="prevMenudeo">$0.00</span>
    <div class="hint">solo referencia</div>
  </div>

  <button class="reset" onclick="resetear()">Reset</button>
</div>

<script>
function aplicarRedondeo(n) {
  let d = n % 10;
  if (d === 7 || d === 8) return n + (9 - d);
  if (d === 2 || d === 3 || d === 4) return n + (5 - d);
  return n;
}

function calcular() {
  let costo = parseFloat(document.getElementById("costo").value) || 0;
  let descuento = parseFloat(document.getElementById("descuento").value) || 0;

  let r1 = costo - (costo * (descuento / 100));
  let r2 = r1 * 1.16 * 1.4;
  let redondeadoFinal = aplicarRedondeo(Math.round(r2));
  let r3 = redondeadoFinal / 1.16;
  let menudeo = r3 * 1.5;
  let prevPDV = redondeadoFinal;
  let prevMenudeo = aplicarRedondeo(Math.round(menudeo * 1.16));

  document.getElementById("r1").innerText = "$" + r1.toFixed(2);
  document.getElementById("r3").innerText = "$" + r3.toFixed(2);
  document.getElementById("menudeo").innerText = "$" + menudeo.toFixed(2);
  document.getElementById("prevPDV").innerText = "$" + prevPDV.toFixed(2);
  document.getElementById("prevMenudeo").innerText = "$" + prevMenudeo.toFixed(2);
}

function copiar(id, elemento) {
  let texto = document.getElementById(id).innerText.replace("$", "");
  navigator.clipboard.writeText(texto);

  elemento.classList.add("copiado");
  setTimeout(() => elemento.classList.remove("copiado"), 300);
}

function resetear() {
  document.getElementById("costo").value = "";
  document.getElementById("descuento").value = "0";
  calcular();
}

document.getElementById("costo").addEventListener("input", calcular);
document.getElementById("descuento").addEventListener("input", calcular);
</script>

</body>
</html>
