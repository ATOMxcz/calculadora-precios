<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 24px;
  width: 320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

label {
  font-size: 13px;
  opacity: 0.6;
}

input {
  width: 100%;
  padding: 14px;
  margin: 6px 0 14px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  background: #2c2c2e;
  color: white;
  outline: none;
}

.result {
  background: #2c2c2e;
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}

.result:hover {
  background: #3a3a3c;
}

.result.copiado {
  background: #0a84ff;
}

.result span {
  font-size: 18px;
  font-weight: bold;
}

.hint {
  font-size: 11px;
  opacity: 0.4;
  margin-top: 4px;
}

.reset {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #3a3a3c;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Calculadora</h2>

  <label>Costo</label>
  <input type="number" id="costo" placeholder="Ej: 100">

  <label>Descuento (%)</label>
  <input type="number" id="descuento" value="0">

  <div class="result" onclick="copiar('r1', this)">
    Resultado 1: <span id="r1">$0.00</span>
    <div class="hint">toca para copiar</div>
  </div>

  <div class="result" onclick="copiar('r3', this)">
    Resultado 3: <span id="r3">$0.00</span>
    <div class="hint">toca para copiar</div>
  </div>

  <button class="reset" onclick="resetear()">Reset</button>
</div>

<script>
function calcular() {
  let costo = parseFloat(document.getElementById("costo").value) || 0;
  let descuento = parseFloat(document.getElementById("descuento").value) || 0;

  let r1 = costo - (costo * (descuento / 100));
  let r2 = r1 * 1.16 * 1.4;
  let redondeado = Math.round(r2);
  let r3 = redondeado / 1.16;

  document.getElementById("r1").innerText = "$" + r1.toFixed(2);
  document.getElementById("r3").innerText = "$" + r3.toFixed(2);
}

function copiar(id, elemento) {
  let texto = document.getElementById(id).innerText;
  navigator.clipboard.writeText(texto);

  elemento.classList.add("copiado");
  setTimeout(() => elemento.classList.remove("copiado"), 300);
}

function resetear() {
  document.getElementById("costo").value = "";
  document.getElementById("descuento").value = "0";
  calcular();
}

document.getElementById("costo").addEventListener("input", calcular);
document.getElementById("descuento").addEventListener("input", calcular);
</script>

</body>
</html>
