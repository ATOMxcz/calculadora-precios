<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Precio - IMR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 450px;
            margin: 40px auto;
            padding: 20px;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 18px;
            box-sizing: border-box; /* Evita que el input se salga del borde */
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .resultado-container {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            border-left: 4px solid #38bdf8;
        }
        .valor {
            float: right;
            font-weight: bold;
            color: #38bdf8;
            font-size: 20px;
        }
        .clear {
            clear: both;
        }
    </style>
</head>
<body>

    <h2>Calculadora IMR</h2>

    <label>Costo Inicial ($):</label>
    <input type="number" id="costo" placeholder="0.00" step="0.01">

    <label>Descuento (%):</label>
    <input type="number" id="descuento" value="0" step="0.1">

    <div class="resultado-container">
        <span>Costo con Descuento:</span>
        <span class="valor" id="r1">0.00</span>
        <div class="clear"></div>
    </div>

    <div class="resultado-container" style="border-left-color: #10b981;">
        <span>Precio Final Sugerido:</span>
        <span class="valor" id="r3" style="color: #10b981;">0.00</span>
        <div class="clear"></div>
    </div>

    <script>
        function calcular() {
            const costo = parseFloat(document.getElementById("costo").value) || 0;
            const descuento = parseFloat(document.getElementById("descuento").value) || 0;

            // 1. Aplicar descuento
            const resultado1 = costo - (costo * (descuento / 100));

            // 2. Aplicar IVA (1.16) y Margen (1.4), luego redondear
            const resultado2 = Math.round(resultado1 * 1.16 * 1.4);

            // 3. Desglosar el IVA del redondeo (Resultado 3)
            const resultado3 = resultado2 / 1.16;

            // Mostrar resultados
            document.getElementById("r1").innerText = resultado1.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById("r3").innerText = resultado3.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // Eventos para calcular al escribir
        document.getElementById("costo").addEventListener("input", calcular);
        document.getElementById("descuento").addEventListener("input", calcular);
    </script>

</body>
</html>
